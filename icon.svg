<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#da9a52"/>
      <stop offset="1" stop-color="#7a3d10"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="mk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b87333"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle copper border -->
  <rect x="4" y="4" width="504" height="504" rx="110" fill="none" stroke="#b87333" stroke-width="6" opacity="0.22"/>

  <!-- Bar chart — 3 bars rising left to right -->
  <rect x="96"  y="318" width="88" height="140" rx="14" fill="url(#bar)" opacity="0.65"/>
  <rect x="212" y="238" width="88" height="220" rx="14" fill="url(#bar)" opacity="0.82"/>
  <rect x="328" y="152" width="88" height="306" rx="14" fill="url(#bar)"/>

  <!-- Rising trend line over bars -->
  <path d="M140,286 C 200,210 284,196 372,136" stroke="#ebb96a" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- Glowing dot at trend tip -->
  <circle cx="372" cy="136" r="22" fill="#b87333" opacity="0.2"/>
  <circle cx="372" cy="136" r="13" fill="#da9a52"/>
</svg>
